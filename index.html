<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>메타몽스티커떼기</title>
  <style>
    :root {
      --ink: #2f2640;
      --soft-ink: #675a7c;
      --pink: #ff6fa9;
      --rose: #ef3f6b;
      --lilac: #c58bff;
      --ditto: #b888f4;
      --ditto-deep: #9c68dc;
      --cream: #fff8fb;
      --mint: #bdebdc;
      --yellow: #ffe081;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 224, 129, 0.45), transparent 24rem),
        radial-gradient(circle at 82% 18%, rgba(189, 235, 220, 0.58), transparent 22rem),
        linear-gradient(135deg, #fff6fb 0%, #f6f2ff 45%, #fffdf5 100%);
    }

    button {
      font: inherit;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .stage {
      position: relative;
      isolation: isolate;
      width: 100vw;
      height: 100svh;
      min-height: 560px;
      overflow: hidden;
      touch-action: manipulation;
    }

    .top-copy {
      position: absolute;
      z-index: 5;
      top: clamp(22px, 4vh, 46px);
      left: 50%;
      width: min(92vw, 720px);
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    .top-copy h1 {
      margin: 0;
      font-size: clamp(25px, 5vw, 54px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .top-copy p {
      margin: 12px auto 0;
      max-width: 520px;
      color: var(--soft-ink);
      font-size: clamp(14px, 2.2vw, 18px);
      line-height: 1.55;
    }

    .progress {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 8px 12px;
      border: 1px solid rgba(184, 136, 244, 0.26);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: #73509f;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 32px rgba(88, 57, 119, 0.08);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .progress-dot {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 0;
      padding: 0;
      border-radius: 8px;
      background: url("public/assets/stickers/ditto/132.png") center / contain no-repeat;
      filter: drop-shadow(0 4px 4px rgba(91, 54, 124, 0.18));
      transition: opacity 240ms ease, transform 240ms ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .progress-dot.is-popped {
      opacity: 0;
      transform: scale(0.25) rotate(-12deg);
    }

    .ditto-field {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .ditto {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: clamp(138px, var(--size), 260px);
      aspect-ratio: 1;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%) rotate(var(--rot));
      animation: bob var(--speed) ease-in-out infinite;
      animation-delay: var(--delay);
      filter: drop-shadow(0 16px 18px rgba(91, 54, 124, 0.2));
      -webkit-tap-highlight-color: transparent;
    }

    .ditto-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 190ms ease, filter 190ms ease;
      user-select: none;
      pointer-events: none;
    }

    .ditto:focus-visible {
      outline: 4px solid rgba(239, 63, 107, 0.42);
      outline-offset: 8px;
      border-radius: 44%;
    }

    .ditto:hover .ditto-img {
      transform: scale(1.08);
      filter: saturate(1.12);
    }

    .real-pokemon {
      z-index: 18;
    }

    .real-pokemon.is-splashing {
      animation: splash-bounce 620ms cubic-bezier(0.18, 0.86, 0.22, 1.16);
    }

    .real-pokemon.is-popped {
      pointer-events: none;
      animation: pop-out 520ms ease forwards;
    }

    .ditto-body {
      position: absolute;
      inset: 7% 4% 4%;
      border: 2px solid rgba(82, 52, 109, 0.12);
      border-radius: 46% 43% 44% 48% / 48% 50% 42% 45%;
      background:
        radial-gradient(circle at 28% 30%, rgba(255, 255, 255, 0.48), transparent 15%),
        linear-gradient(150deg, #c897ff 0%, var(--ditto) 58%, var(--ditto-deep) 100%);
      transition: transform 190ms ease, filter 190ms ease;
    }

    .ditto:hover .ditto-body {
      transform: scale(1.06);
      filter: saturate(1.12);
    }

    .ditto-eye,
    .ditto-eye::after {
      position: absolute;
      top: 38%;
      width: 9%;
      height: 4%;
      border-radius: 99px;
      background: #332642;
      content: "";
    }

    .ditto-eye {
      left: 30%;
    }

    .ditto-eye::after {
      top: 0;
      left: 410%;
      width: 100%;
      height: 100%;
    }

    .ditto-mouth {
      position: absolute;
      left: 48%;
      top: 54%;
      transform: translateX(-50%);
    }

    .smile .ditto-mouth {
      width: 26%;
      height: 12%;
      border-bottom: 4px solid #332642;
      border-radius: 0 0 999px 999px;
    }

    .heart-eyes .ditto-eye,
    .heart-eyes .ditto-eye::after {
      width: 12%;
      height: 11%;
      transform: rotate(45deg);
      border-radius: 2px 2px 0 2px;
      background: var(--rose);
    }

    .heart-eyes .ditto-eye::before,
    .heart-eyes .ditto-eye::after {
      content: "";
      box-shadow:
        -4px 0 0 0 var(--rose),
        0 -4px 0 0 var(--rose);
    }

    .heart-eyes .ditto-mouth {
      width: 28%;
      height: 14%;
      border-bottom: 4px solid #332642;
      border-radius: 0 0 999px 999px;
    }

    .wink .ditto-eye {
      height: 5%;
      transform: rotate(-8deg);
    }

    .wink .ditto-eye::after {
      height: 11px;
      border-radius: 50%;
      transform: translateY(-4px);
    }

    .wink .ditto-mouth {
      width: 18%;
      height: 15%;
      border: 4px solid #332642;
      border-top: 0;
      border-left: 0;
      border-radius: 0 0 999px 0;
      transform: translateX(-50%) rotate(12deg);
    }

    .shy .ditto-mouth {
      width: 16%;
      height: 8%;
      border-bottom: 4px solid #332642;
      border-radius: 0 0 999px 999px;
    }

    .shy .ditto-body::before,
    .shy .ditto-body::after {
      position: absolute;
      top: 48%;
      width: 13%;
      height: 6%;
      border-radius: 50%;
      background: rgba(255, 111, 169, 0.42);
      content: "";
    }

    .shy .ditto-body::before {
      left: 17%;
    }

    .shy .ditto-body::after {
      right: 20%;
    }

    .surprise .ditto-mouth {
      width: 13%;
      height: 13%;
      border-radius: 50%;
      background: #332642;
    }

    .sparkle {
      position: absolute;
      z-index: 1;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(255, 111, 169, 0.7);
      animation: drift 7s ease-in-out infinite;
      opacity: 0.5;
    }

    .question-panel {
      position: absolute;
      z-index: 10;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      transition: opacity 520ms ease, transform 520ms ease;
    }

    .question-panel.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .question-inner {
      width: min(92vw, 670px);
      text-align: center;
    }

    .question-inner h2 {
      margin: 0 auto;
      font-size: clamp(31px, 6.5vw, 70px);
      line-height: 1.12;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .question-inner p {
      margin: 18px auto 0;
      max-width: 520px;
      color: var(--soft-ink);
      font-size: clamp(15px, 2.5vw, 20px);
      line-height: 1.6;
    }

    .choices {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      min-height: 132px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .choice {
      position: relative;
      min-width: 132px;
      min-height: 58px;
      border: 0;
      border-radius: 16px;
      color: white;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(239, 63, 107, 0.2);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .choice:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 42px rgba(239, 63, 107, 0.26);
    }

    .yes {
      background: linear-gradient(135deg, #ff548b, #ef3f6b);
    }

    .no {
      background: linear-gradient(135deg, #8f7ab8, #6d5a8d);
    }

    .crawl-runner {
      position: absolute;
      left: var(--start-x);
      top: var(--start-y);
      width: 240px;
      height: 150px;
      pointer-events: none;
      z-index: 260;
      transform: translate(-50%, -50%);
      animation: crawl-runner-away 5400ms linear forwards;
    }

    .crawl-sprite {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 190px;
      max-width: none;
      height: auto;
      transform: translateX(-50%);
      filter: drop-shadow(0 16px 18px rgba(91, 54, 124, 0.2));
      pointer-events: none;
      user-select: none;
    }

    .crawl-sprite.stand {
      bottom: -8px;
      width: 138px;
      animation: sprite-stand 1250ms steps(1, end) infinite;
    }

    .crawl-sprite.mid {
      bottom: 2px;
      width: 196px;
      animation: sprite-mid 1250ms steps(1, end) infinite;
    }

    .crawl-sprite.pressed {
      bottom: 4px;
      width: 220px;
      animation: sprite-pressed 1250ms steps(1, end) infinite;
    }

    .celebration {
      position: absolute;
      z-index: 8;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .water-screen {
      position: absolute;
      z-index: 300;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
    }

    .water-screen.is-visible {
      animation: water-cover 1200ms ease forwards;
    }

    .water-screen::before {
      position: absolute;
      inset: -12%;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.95) 0 1.8%, transparent 2.1%),
        radial-gradient(circle at 32% 72%, rgba(255, 255, 255, 0.86) 0 1.3%, transparent 1.6%),
        radial-gradient(circle at 68% 26%, rgba(255, 255, 255, 0.92) 0 1.6%, transparent 1.9%),
        radial-gradient(circle at 82% 64%, rgba(255, 255, 255, 0.82) 0 1.4%, transparent 1.7%),
        radial-gradient(circle at 45% 42%, rgba(255, 255, 255, 0.86) 0 1.2%, transparent 1.5%),
        linear-gradient(135deg, rgba(76, 196, 255, 0.82), rgba(181, 235, 255, 0.9) 48%, rgba(72, 170, 255, 0.78));
      content: "";
      transform: translateY(100%) rotate(-6deg) scale(1.1);
      animation: water-sheet 1200ms cubic-bezier(0.12, 0.76, 0.16, 1) forwards;
    }

    .water-drop {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 52% 48% 55% 45% / 58% 42% 58% 42%;
      background: radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.92), rgba(124, 217, 255, 0.86) 42%, rgba(31, 143, 232, 0.74));
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.25);
      animation: water-drop 1100ms cubic-bezier(0.14, 0.78, 0.22, 1) forwards;
      animation-delay: var(--d);
    }

    .petal {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(var(--r));
      animation: bloom 1200ms cubic-bezier(0.18, 0.92, 0.25, 1.12) forwards;
      animation-delay: var(--d);
    }

    .petal.heart::before,
    .petal.heart::after {
      position: absolute;
      width: 52%;
      height: 82%;
      border-radius: 999px 999px 0 0;
      background: linear-gradient(180deg, #ff6f9f, #ef3f6b);
      content: "";
    }

    .petal.heart::before {
      left: 50%;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .petal.heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    .petal.rose {
      border-radius: 68% 32% 61% 39% / 52% 45% 55% 48%;
      background:
        radial-gradient(circle at 35% 38%, #ffd0df 0 13%, transparent 14%),
        linear-gradient(135deg, #ff86ae, #d92555);
      box-shadow: inset -6px -7px 0 rgba(168, 15, 58, 0.15);
    }

    .answer-note {
      margin-top: 16px;
      min-height: 28px;
      color: var(--rose);
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 900;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .answer-note.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ditto.is-popped {
      pointer-events: none;
      animation: pop-out 360ms ease forwards;
    }

    .stage.final .top-copy {
      opacity: 0;
      transition: opacity 300ms ease;
    }

    @keyframes bob {
      0%,
      100% {
        translate: 0 0;
      }
      50% {
        translate: 0 -18px;
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(16px, -28px) scale(1.25);
      }
    }

    @keyframes pop-out {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--rot)) scale(1);
      }
      70% {
        opacity: 0.82;
        transform: translate(-50%, -50%) rotate(calc(var(--rot) + 16deg)) scale(1.28);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(calc(var(--rot) - 18deg)) scale(0.12);
      }
    }

    @keyframes splash-bounce {
      0% {
        transform: translate(-50%, -50%) rotate(var(--rot)) scale(1);
      }
      38% {
        transform: translate(-50%, -50%) rotate(calc(var(--rot) - 10deg)) scale(1.18);
      }
      100% {
        transform: translate(-50%, -50%) rotate(var(--rot)) scale(1);
      }
    }

    @keyframes water-cover {
      0% {
        opacity: 0;
      }
      14%,
      68% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    @keyframes water-sheet {
      0% {
        transform: translateY(100%) rotate(-6deg) scale(1.1);
      }
      34%,
      70% {
        transform: translateY(0) rotate(-3deg) scale(1.1);
      }
      100% {
        transform: translateY(-108%) rotate(4deg) scale(1.1);
      }
    }

    @keyframes water-drop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.35);
      }
    }

    @keyframes crawl-runner-away {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) rotate(0deg) scale(0.82);
      }
    }

    @keyframes sprite-stand {
      0%,
      19.999%,
      80%,
      100% {
        opacity: 1;
      }
      20%,
      79.999% {
        opacity: 0;
      }
    }

    @keyframes sprite-mid {
      0%,
      19.999%,
      40%,
      59.999%,
      80%,
      100% {
        opacity: 0;
      }
      20%,
      39.999%,
      60%,
      79.999% {
        opacity: 1;
      }
    }

    @keyframes sprite-pressed {
      0%,
      39.999%,
      60%,
      100% {
        opacity: 0;
      }
      40%,
      59.999% {
        opacity: 1;
      }
    }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.15) rotate(var(--r));
      }
      55% {
        opacity: 1;
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.1) rotate(calc(var(--r) + 22deg));
      }
      100% {
        opacity: 1;
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(calc(var(--r) + 10deg));
      }
    }

    @media (max-width: 640px) {
      .stage {
        min-height: 620px;
      }

      .top-copy {
        top: 20px;
      }

      .choice {
        min-width: 118px;
        min-height: 54px;
        border-radius: 14px;
        font-size: 18px;
      }

      .ditto {
        width: clamp(108px, var(--size), 188px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <section class="top-copy" aria-live="polite">
      <div class="progress">
        <button class="progress-dot" id="progressSticker" type="button" aria-label="카운터 메타몽 스티커 떼기"></button>
        <span id="counter">0 / 31</span>
      </div>
    </section>

    <div class="ditto-field" id="dittoField" aria-label="메타몽 친구들"></div>
    <div class="water-screen" id="waterScreen" aria-hidden="true"></div>
    <div class="celebration" id="celebration" aria-hidden="true"></div>

    <section class="question-panel" id="questionPanel" aria-hidden="true">
      <div class="question-inner">
        <h2>우리, 한번 만나볼까요?</h2>
        <div class="choices">
          <button class="choice yes" id="yesButton" type="button">네</button>
          <button class="choice no" id="noButton" type="button">아니요</button>
        </div>
        <div class="answer-note" id="answerNote">이제 장미랑 하트만 남겨둘게요.</div>
      </div>
    </section>
  </main>

  <script>
    const totalStickerGoal = 31;
    const fieldStickerCount = 30;
    const collageSlots = [
      [6, 7, 38, -18, 78], [25, 6, 34, 14, 64], [47, 8, 39, -8, 91], [70, 7, 35, 22, 55], [93, 9, 40, -16, 82],
      [13, 22, 42, 24, 66], [36, 20, 37, -22, 96], [61, 23, 43, 10, 70], [85, 22, 39, -26, 88],
      [3, 39, 45, 12, 58], [24, 38, 40, -12, 84], [49, 39, 46, 28, 99], [75, 38, 41, -9, 62], [97, 40, 44, 18, 90],
      [15, 55, 44, -28, 93], [39, 56, 48, 9, 60], [64, 55, 43, -18, 100], [88, 57, 47, 24, 74],
      [5, 72, 43, 20, 69], [28, 73, 49, -8, 95], [52, 72, 45, 17, 57], [77, 74, 50, -25, 87], [96, 73, 42, 10, 98],
      [13, 90, 47, -14, 81], [35, 91, 42, 26, 59], [58, 90, 48, -21, 92], [82, 91, 45, 15, 67],
      [22, 49, 52, 33, 101], [69, 48, 51, -34, 103], [43, 28, 50, 19, 105], [56, 84, 53, -11, 107]
    ];
    const stickerSources = [
      "001.png", "008.png", "132-lean-left.png", "025.png", "039.png", "047.png", "050.png", "132-squash.png", "052.png", "067.png",
      "076.png", "094.png", "095.png", "132-lean-right.png", "105.png", "107.png", "129.png", "132-flat-left.png", "132.png", "133.png",
      "134.png", "135.png", "132-tall.png", "136.png", "137.png", "139.png", "143.png", "132-wide-right.png", "149.png", "151.png"
    ];

    const dittos = Array.from({ length: fieldStickerCount }, (_, index) => {
      const [x, y, size, rot, layer] = collageSlots[index];

      return {
        x: `${x}%`,
        y: `${y}%`,
        size: `${size}vw`,
        rot: `${rot}deg`,
        src: `public/assets/stickers/ditto/${stickerSources[index]}`,
        speed: `${3.7 + (index % 5) * 0.45}s`,
        delay: `${(index % 11) * -0.21}s`,
        layer: `${layer}`
      };
    });

    const field = document.getElementById("dittoField");
    const progressSticker = document.getElementById("progressSticker");
    const counter = document.getElementById("counter");
    const panel = document.getElementById("questionPanel");
    const stage = document.getElementById("stage");
    const waterScreen = document.getElementById("waterScreen");
    const noButton = document.getElementById("noButton");
    const yesButton = document.getElementById("yesButton");
    const celebration = document.getElementById("celebration");
    const answerNote = document.getElementById("answerNote");
    let removed = 0;
    let audioContext;
    let waterTimer;

    function getAudioContext() {
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      return audioContext;
    }

    function playDittoSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const notes = [520, 660, 590];

      notes.forEach((frequency, index) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, now + index * 0.07);
        oscillator.frequency.exponentialRampToValueAtTime(frequency * 1.2, now + index * 0.07 + 0.08);
        gain.gain.setValueAtTime(0.0001, now + index * 0.07);
        gain.gain.exponentialRampToValueAtTime(0.12, now + index * 0.07 + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.07 + 0.13);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now + index * 0.07);
        oscillator.stop(now + index * 0.07 + 0.15);
      });
    }

    function playYesSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      [392, 523.25, 659.25, 783.99].forEach((frequency, index) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "triangle";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.0001, now + index * 0.09);
        gain.gain.exponentialRampToValueAtTime(0.11, now + index * 0.09 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.09 + 0.22);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now + index * 0.09);
        oscillator.stop(now + index * 0.09 + 0.24);
      });
    }

    function playWaterSplashSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const noiseLength = Math.floor(ctx.sampleRate * 0.55);
      const buffer = ctx.createBuffer(1, noiseLength, ctx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < noiseLength; i += 1) {
        const fade = 1 - i / noiseLength;
        data[i] = (Math.random() * 2 - 1) * fade * fade;
      }

      const noise = ctx.createBufferSource();
      const noiseGain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      noise.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(850, now);
      filter.frequency.exponentialRampToValueAtTime(2200, now + 0.18);
      filter.Q.setValueAtTime(0.7, now);
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.24, now + 0.025);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.58);

      [180, 260, 340].forEach((frequency, index) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, now + index * 0.035);
        oscillator.frequency.exponentialRampToValueAtTime(frequency * 0.62, now + 0.22 + index * 0.035);
        gain.gain.setValueAtTime(0.0001, now + index * 0.035);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.03 + index * 0.035);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24 + index * 0.035);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now + index * 0.035);
        oscillator.stop(now + 0.28 + index * 0.035);
      });
    }

    function createDitto(item, index) {
      const button = document.createElement("button");
      button.className = "ditto";
      button.type = "button";
      button.setAttribute("aria-label", `표정 ${index + 1} 메타몽 보내기`);
      button.style.setProperty("--x", item.x);
      button.style.setProperty("--y", item.y);
      button.style.setProperty("--size", item.size);
      button.style.setProperty("--rot", item.rot);
      button.style.setProperty("--speed", item.speed);
      button.style.setProperty("--delay", item.delay);
      button.style.zIndex = item.layer;
      button.innerHTML = `
        <img class="ditto-img" src="${item.src}" alt="" draggable="false" />
      `;
      button.addEventListener("click", () => removeDitto(button));
      return button;
    }

    function createRealPokemonSticker() {
      const button = document.createElement("button");
      button.className = "ditto real-pokemon";
      button.type = "button";
      button.setAttribute("aria-label", "진짜 포켓몬 스티커 물튀기기");
      button.style.setProperty("--x", "79%");
      button.style.setProperty("--y", "76%");
      button.style.setProperty("--size", "45vw");
      button.style.setProperty("--rot", "17deg");
      button.style.setProperty("--speed", "4.8s");
      button.style.setProperty("--delay", "-1.4s");
      button.style.zIndex = "18";
      button.dataset.splashes = "0";
      button.innerHTML = `
        <img class="ditto-img" src="public/assets/stickers/ditto/130.png" alt="" draggable="false" />
      `;
      button.addEventListener("click", () => splashRealPokemon(button));
      return button;
    }

    function removeDitto(button) {
      if (button.classList.contains("is-popped")) return;
      playDittoSound();
      button.classList.add("is-popped");
      removed += 1;
      counter.textContent = `${removed} / ${totalStickerGoal}`;

      setTimeout(() => button.remove(), 380);

      maybeShowQuestion();
    }

    function removeProgressSticker() {
      if (!progressSticker || progressSticker.classList.contains("is-popped")) return;
      playDittoSound();
      progressSticker.classList.add("is-popped");
      removed += 1;
      counter.textContent = `${removed} / ${totalStickerGoal}`;
      maybeShowQuestion();
    }

    function splashRealPokemon(button) {
      if (button.classList.contains("is-popped")) return;
      const splashes = Number(button.dataset.splashes || "0") + 1;
      button.dataset.splashes = `${splashes}`;
      const isFinalSplash = splashes >= 5;
      playWaterSplashSound();
      button.classList.remove("is-splashing");
      void button.offsetWidth;
      button.classList.add(isFinalSplash ? "is-popped" : "is-splashing");
      waterScreen.classList.remove("is-visible");
      waterScreen.innerHTML = "";

      const dropCount = isFinalSplash ? 64 : 38;
      for (let i = 0; i < dropCount; i += 1) {
        const drop = document.createElement("span");
        drop.className = "water-drop";
        drop.style.setProperty("--x", `${6 + Math.random() * 88}%`);
        drop.style.setProperty("--y", `${8 + Math.random() * 82}%`);
        drop.style.setProperty("--s", `${34 + Math.random() * (isFinalSplash ? 94 : 72)}px`);
        drop.style.setProperty("--tx", `${(Math.random() - 0.5) * (isFinalSplash ? 360 : 260)}px`);
        drop.style.setProperty("--ty", `${(Math.random() - 0.5) * (isFinalSplash ? 300 : 220)}px`);
        drop.style.setProperty("--d", `${Math.random() * (isFinalSplash ? 0.26 : 0.2)}s`);
        waterScreen.appendChild(drop);
      }

      void waterScreen.offsetWidth;
      waterScreen.classList.add("is-visible");
      clearTimeout(waterTimer);
      waterTimer = setTimeout(() => {
        waterScreen.classList.remove("is-visible");
        waterScreen.innerHTML = "";
      }, 1240);

      if (isFinalSplash) {
        setTimeout(() => button.remove(), 560);
      }
    }

    function maybeShowQuestion() {
      if (removed === totalStickerGoal) {
        setTimeout(showQuestion, 520);
      }
    }

    function showQuestion() {
      stage.classList.add("final");
      panel.classList.add("is-visible");
      panel.setAttribute("aria-hidden", "false");
      yesButton.focus();
    }

    function scatterSparkles() {
      for (let i = 0; i < 22; i += 1) {
        const dot = document.createElement("span");
        dot.className = "sparkle";
        dot.style.left = `${Math.random() * 100}%`;
        dot.style.top = `${Math.random() * 100}%`;
        dot.style.animationDelay = `${Math.random() * 4}s`;
        dot.style.background = i % 3 === 0 ? "rgba(189, 235, 220, 0.8)" : i % 3 === 1 ? "rgba(255, 224, 129, 0.75)" : "rgba(255, 111, 169, 0.72)";
        stage.appendChild(dot);
      }
    }

    function celebrate() {
      playYesSound();
      answerNote.classList.add("is-visible");
      yesButton.textContent = "좋아요";
      yesButton.disabled = true;
      noButton.remove();
      celebration.innerHTML = "";

      dittos.forEach((item, index) => {
        const petal = document.createElement("span");
        petal.className = `petal ${index % 2 === 0 ? "heart" : "rose"}`;
        petal.style.setProperty("--x", item.x);
        petal.style.setProperty("--y", item.y);
        petal.style.setProperty("--s", `${42 + (index % 5) * 9}px`);
        petal.style.setProperty("--r", `${index * 28 - 70}deg`);
        petal.style.setProperty("--d", `${index * 0.055}s`);
        petal.style.setProperty("--tx", `${Math.cos(index) * 24}px`);
        petal.style.setProperty("--ty", `${Math.sin(index * 1.4) * 24}px`);
        celebration.appendChild(petal);
      });
    }

    function getEscapeVector() {
      const noRect = noButton.getBoundingClientRect();
      const yesRect = yesButton.getBoundingClientRect();
      const toYesX = (yesRect.left + yesRect.width / 2) - (noRect.left + noRect.width / 2);
      const toYesY = (yesRect.top + yesRect.height / 2) - (noRect.top + noRect.height / 2);
      const toYesLength = Math.hypot(toYesX, toYesY) || 1;
      const yesUnitX = toYesX / toYesLength;
      const yesUnitY = toYesY / toYesLength;
      const distance = Math.max(window.innerWidth, window.innerHeight) * 1.18;

      for (let attempt = 0; attempt < 24; attempt += 1) {
        const angle = Math.random() * Math.PI * 2;
        const dx = Math.cos(angle);
        const dy = Math.sin(angle);
        const pointsTowardYes = dx * yesUnitX + dy * yesUnitY > 0.28;
        if (!pointsTowardYes) {
          return { dx: dx * distance, dy: dy * distance };
        }
      }

      return { dx: -yesUnitY * distance, dy: yesUnitX * distance };
    }

    function spawnCrawlingDitto() {
      const stageRect = stage.getBoundingClientRect();
      const noRect = noButton.getBoundingClientRect();
      const startX = noRect.left + noRect.width / 2 - stageRect.left;
      const startY = noRect.top + noRect.height / 2 - stageRect.top;
      const vector = getEscapeVector();
      const runner = document.createElement("div");
      runner.className = "crawl-runner";
      runner.style.setProperty("--start-x", `${startX}px`);
      runner.style.setProperty("--start-y", `${startY}px`);
      runner.style.setProperty("--dx", `${vector.dx}px`);
      runner.style.setProperty("--dy", `${vector.dy}px`);
      runner.innerHTML = `
        <img class="crawl-sprite stand" src="public/assets/crawl-sprite/slime-stand.png" alt="" draggable="false" />
        <img class="crawl-sprite mid" src="public/assets/crawl-sprite/slime-mid.png" alt="" draggable="false" />
        <img class="crawl-sprite pressed" src="public/assets/crawl-sprite/slime-pressed.png" alt="" draggable="false" />
      `;
      stage.appendChild(runner);
      setTimeout(() => runner.remove(), 5450);
    }

    noButton.addEventListener("click", () => {
      playDittoSound();
      spawnCrawlingDitto();
    });

    yesButton.addEventListener("click", celebrate);
    progressSticker.addEventListener("click", removeProgressSticker);
    document.addEventListener("dblclick", (event) => event.preventDefault(), { passive: false });

    dittos.map(createDitto).forEach((ditto) => field.appendChild(ditto));
    field.appendChild(createRealPokemonSticker());
    scatterSparkles();
  </script>
</body>
</html>
